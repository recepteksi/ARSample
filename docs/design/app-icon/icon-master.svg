<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Master Icon Design for ARSample App -->
  <!-- AR-themed 3D cube with scan corners -->
  
  <defs>
    <!-- Gradient for modern look -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Cube gradient -->
    <linearGradient id="cubeGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="cubeGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c7d2fe;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#a5b4fc;stop-opacity:0.85" />
    </linearGradient>
    
    <linearGradient id="cubeGradient3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#a5b4fc;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="226.67" fill="url(#bgGradient)"/>
  
  <!-- AR Corner Markers (Scan Frame) -->
  <g stroke="#ffffff" stroke-width="12" fill="none" opacity="0.8">
    <!-- Top-left corner -->
    <path d="M 220 180 L 180 180 L 180 220"/>
    
    <!-- Top-right corner -->
    <path d="M 844 180 L 844 180 L 844 220"/>
    <path d="M 804 180 L 844 180"/>
    
    <!-- Bottom-left corner -->
    <path d="M 220 844 L 180 844 L 180 804"/>
    
    <!-- Bottom-right corner -->
    <path d="M 804 844 L 844 844 L 844 804"/>
  </g>
  
  <!-- 3D Cube (Isometric) with shadow -->
  <g transform="translate(512, 480)" filter="url(#shadow)">
    <!-- Top face -->
    <path d="M 0,-120 L 140,0 L 0,120 L -140,0 Z" fill="url(#cubeGradient1)"/>
    
    <!-- Left face -->
    <path d="M -140,0 L 0,120 L 0,260 L -140,140 Z" fill="url(#cubeGradient2)"/>
    
    <!-- Right face -->
    <path d="M 0,120 L 140,0 L 140,140 L 0,260 Z" fill="url(#cubeGradient3)"/>
    
    <!-- Edge highlights for depth -->
    <path d="M 0,-120 L 140,0 L 0,120 L -140,0 Z" 
          fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <path d="M 0,120 L 0,260" 
          stroke="#4338ca" stroke-width="3" opacity="0.6"/>
  </g>
  
  <!-- AR Grid Dots (Subtle) -->
  <g fill="#ffffff" opacity="0.15">
    <circle cx="300" cy="280" r="6"/>
    <circle cx="380" cy="320" r="6"/>
    <circle cx="644" cy="320" r="6"/>
    <circle cx="724" cy="280" r="6"/>
    <circle cx="300" cy="680" r="6"/>
    <circle cx="380" cy="720" r="6"/>
    <circle cx="644" cy="720" r="6"/>
    <circle cx="724" cy="680" r="6"/>
  </g>
  
  <!-- Small GLB text badge (optional, can be removed for simpler design) -->
  <g transform="translate(512, 760)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" 
          fill="#ffffff" opacity="0.2"/>
    <text x="0" y="8" 
          font-family="Arial, sans-serif" 
          font-size="24" 
          font-weight="bold" 
          fill="#ffffff" 
          text-anchor="middle">GLB</text>
  </g>
</svg>
