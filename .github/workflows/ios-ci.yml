name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-ios:
    name: Build and Test iOS
    runs-on: macos-14  # Latest macOS with Xcode 15+
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Setup Java (for KMP)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Remove local Java home setting
        run: sed -i '' '/org.gradle.java.home/d' gradle.properties
      
      - name: Build KMP iOS framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
        
      - name: Build iOS app
        working-directory: iosApp
        run: |
          xcodebuild clean build \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Run iOS tests (if tests exist)
        working-directory: iosApp
        continue-on-error: true  # Don't fail if no tests exist yet
        run: |
          xcodebuild test \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO || echo "No tests found or tests failed"
      
      - name: Install SwiftLint
        run: brew install swiftlint
        
      - name: Run SwiftLint
        working-directory: iosApp
        continue-on-error: true  # Don't fail build on linting issues initially
        run: swiftlint lint --reporter github-actions-logging || echo "SwiftLint warnings/errors found"
      
      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            iosApp/build/
          retention-days: 7
