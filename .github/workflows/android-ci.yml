name: Android CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-android:
    name: Build and Test Android
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon
        
      - name: Run Unit Tests
        run: ./gradlew :composeApp:testDebugUnitTest --no-daemon
        
      - name: Run Lint
        run: ./gradlew :composeApp:lintDebug --no-daemon
        continue-on-error: true  # Don't fail on lint warnings initially
        
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            composeApp/build/reports/tests/
            composeApp/build/reports/lint-results-debug.html
          retention-days: 7
          
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7
